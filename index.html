<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KENFLIX</title>

<link rel="preconnect" href="https://image.tmdb.org">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#111;
color:white;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.85);
z-index:1000;
}

.logo{
font-size:30px;
font-weight:bold;
color:red;
}

.search{
padding:10px;
width:250px;
border:none;
border-radius:5px;
outline:none;
background:#222;
color:white;
}

.banner{
height:70vh;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:40px;
margin-bottom:20px;
}

.banner-content{
max-width:500px;
}

.banner h1{
font-size:60px;
margin-bottom:10px;
}

.banner p{
color:#ddd;
line-height:1.5;
}

.row{
margin-left:20px;
margin-bottom:30px;
}

.row h2{
margin-bottom:10px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding:10px 0;
scroll-behavior:smooth;
}

.row-posters::-webkit-scrollbar{
display:none;
}

.poster{
width:180px;
margin-right:10px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.poster:hover{
transform:scale(1.1);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
width:90%;
max-width:1000px;
position:relative;
}

iframe{
width:100%;
height:550px;
border:none;
border-radius:10px;
}

.close{
position:absolute;
top:-40px;
right:0;
font-size:40px;
cursor:pointer;
}

@media(max-width:768px){

.banner{
height:50vh;
}

.banner h1{
font-size:35px;
}

.poster{
width:130px;
}

iframe{
height:250px;
}

.search{
width:150px;
}
}
</style>
</head>

<body>

<header>
<div class="logo">KENFLIX</div>
<input type="text" class="search" id="search" placeholder="Search movies...">
</header>

<div class="banner" id="banner">
<div class="banner-content">
<h1 id="banner-title">Loading...</h1>
<p id="banner-desc"></p>
</div>
</div>

<div class="row">
<h2>Trending Movies</h2>
<div class="row-posters" id="trending"></div>
</div>

<div class="row">
<h2>TV Series</h2>
<div class="row-posters" id="tv"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" id="close">&times;</span>
<iframe id="player" allowfullscreen allow="autoplay"></iframe>
</div>
</div>

<script>

const TMDB_API = "https://api.themoviedb.org/3";
const TMDB_KEY = "1d3ae144acfb6bfcb25f70361cedcf29";

const IMG = "https://image.tmdb.org/t/p/original";

const trendingEl = document.getElementById("trending");
const tvEl = document.getElementById("tv");

async function fetchMovies(url, container, type){

const res = await fetch(url);
const data = await res.json();

container.innerHTML = "";

data.results.forEach(movie => {

const img = document.createElement("img");

img.src = IMG + movie.poster_path;
img.classList.add("poster");

img.onclick = () => openPlayer(movie.id, type);

container.appendChild(img);

});

}

function openPlayer(id, type){

document.getElementById("modal").style.display = "flex";

/* STREAM PLAYER */

if(type === "tv"){

document.getElementById("player").src =
`https://movie.codespecters.com/embed/tv/${id}`;

}else{

document.getElementById("player").src =
`https://movie.codespecters.com/embed/movie/${id}`;

}

}

document.getElementById("close").onclick = () => {

document.getElementById("modal").style.display = "none";

document.getElementById("player").src = "";

};

async function bannerMovie(){

const res = await fetch(
`${TMDB_API}/trending/movie/week?api_key=${TMDB_KEY}`
);

const data = await res.json();

const movie =
data.results[Math.floor(Math.random()*data.results.length)];

document.getElementById("banner").style.backgroundImage =
`linear-gradient(to top, #111, transparent), url(${IMG + movie.backdrop_path})`;

document.getElementById("banner-title").innerText =
movie.title;

document.getElementById("banner-desc").innerText =
movie.overview;

}

document.getElementById("search").addEventListener("keyup", async(e)=>{

const query = e.target.value;

if(query.length < 2) return;

const res = await fetch(
`${TMDB_API}/search/multi?api_key=${TMDB_KEY}&query=${query}`
);

const data = await res.json();

trendingEl.innerHTML = "";

data.results.forEach(movie=>{

if(!movie.poster_path) return;

const img = document.createElement("img");

img.src = IMG + movie.poster_path;

img.classList.add("poster");

img.onclick = ()=> openPlayer(
movie.id,
movie.media_type === "tv" ? "tv" : "movie"
);

trendingEl.appendChild(img);

});

});

bannerMovie();

fetchMovies(
`${TMDB_API}/trending/movie/week?api_key=${TMDB_KEY}`,
trendingEl,
"movie"
);

fetchMovies(
`${TMDB_API}/tv/popular?api_key=${TMDB_KEY}`,
tvEl,
"tv"
);

</script>

</body>
</html>
