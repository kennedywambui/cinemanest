<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KENFLIX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#141414;color:white;overflow-x:hidden;}

/* NAV */
.nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:15px 40px;z-index:1000;
transition:0.3s;
}
.nav.scrolled{background:#111;}
.logo{color:#e50914;font-size:28px;font-weight:bold;}
.search{
background:rgba(0,0,0,0.6);
border:none;padding:10px 15px;
border-radius:20px;color:white;
}

/* HERO */
.hero{
height:90vh;
display:flex;
align-items:flex-end;
padding:60px;
background-size:cover;
}
.hero h1{font-size:60px;}
.hero p{color:#ddd;margin:10px 0;}

/* ROW */
.row{
margin-top:40px;
padding:0 40px;
margin-bottom:40px;
}
.row h2{margin-bottom:10px;font-size:24px;}

/* SCROLL */
.row-container{position:relative;}
.row-posters{
display:flex;
gap:12px;
overflow-x:auto;
scroll-behavior:smooth;
padding:20px 0;
}
.row-posters::-webkit-scrollbar{display:none;}

/* POSTERS */
.poster-landscape{
width:260px;height:150px;
border-radius:8px;
overflow:hidden;
cursor:pointer;
flex-shrink:0;
}
.poster-portrait{
width:160px;height:240px;
border-radius:8px;
overflow:hidden;
cursor:pointer;
flex-shrink:0;
}

.poster-landscape img,
.poster-portrait img{
width:100%;
height:100%;
object-fit:cover;
}

/* ARROWS */
.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:30px;
background:rgba(0,0,0,0.7);
padding:10px;
cursor:pointer;
border-radius:50%;
z-index:10;
}
.left{left:5px;}
.right{right:5px;}

@media(max-width:768px){
.poster-landscape{width:180px;height:110px;}
.poster-portrait{width:120px;height:180px;}
.arrow{display:none;}
}
</style>
</head>

<body>

<div class="nav" id="nav">
<div class="logo">KENFLIX</div>
<input type="text" id="search" class="search" placeholder="Search...">
</div>

<div class="hero" id="hero">
<div>
<h1 id="hero-title">Loading...</h1>
<p id="hero-desc"></p>
</div>
</div>

<!-- ROWS -->
<div class="row">
<h2>Trending</h2>
<div class="row-container">
<div class="arrow left" onclick="scrollRow('trending',-1)">‹</div>
<div class="arrow right" onclick="scrollRow('trending',1)">›</div>
<div class="row-posters" id="trending"></div>
</div>
</div>

<div class="row">
<h2>Top Rated</h2>
<div class="row-container">
<div class="arrow left" onclick="scrollRow('top',-1)">‹</div>
<div class="arrow right" onclick="scrollRow('top',1)">›</div>
<div class="row-posters" id="top"></div>
</div>
</div>

<div class="row">
<h2>Action Movies</h2>
<div class="row-container">
<div class="arrow left" onclick="scrollRow('action',-1)">‹</div>
<div class="arrow right" onclick="scrollRow('action',1)">›</div>
<div class="row-posters" id="action"></div>
</div>
</div>

<div class="row">
<h2>TV Shows</h2>
<div class="row-container">
<div class="arrow left" onclick="scrollRow('tv',-1)">‹</div>
<div class="arrow right" onclick="scrollRow('tv',1)">›</div>
<div class="row-posters" id="tv"></div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const API_KEY="1d3ae144acfb6bfcb25f70361cedcf29";
const API="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/original";

/* NAV */
window.addEventListener("scroll",()=>{
document.getElementById("nav")
.classList.toggle("scrolled",window.scrollY>50);
});

/* HERO */
async function loadHero(){
const res=await fetch(`${API}/trending/movie/week?api_key=${API_KEY}`);
const data=await res.json();
const m=data.results[Math.floor(Math.random()*data.results.length)];

document.getElementById("hero").style.backgroundImage =
`url(${IMG+m.backdrop_path})`;

document.getElementById("hero-title").innerText = m.title;
document.getElementById("hero-desc").innerText = m.overview;
}

/* FETCH */
async function fetchRow(url,id,type,style){
const res=await fetch(url);
const data=await res.json();
const container=document.getElementById(id);

container.innerHTML="";

data.results.forEach(item=>{
if(!item.poster_path&&!item.backdrop_path)return;

const div=document.createElement("div");
div.className=style==="landscape"?"poster-landscape":"poster-portrait";

const imgPath=style==="landscape"?item.backdrop_path:item.poster_path;

div.innerHTML=`<img src="${IMG+imgPath}">`;

div.onclick=()=>{
window.location.href=`watch.html?id=${item.id}&type=${type}`;
};

container.appendChild(div);
});
}

/* SCROLL */
window.scrollRow=(id,dir)=>{
document.getElementById(id).scrollBy({
left:dir*400,
behavior:"smooth"
});
};

/* LOAD */
loadHero();

fetchRow(`${API}/trending/movie/week?api_key=${API_KEY}`,"trending","movie","landscape");
fetchRow(`${API}/movie/top_rated?api_key=${API_KEY}`,"top","movie","portrait");
fetchRow(`${API}/discover/movie?api_key=${API_KEY}&with_genres=28`,"action","movie","portrait");
fetchRow(`${API}/tv/popular?api_key=${API_KEY}`,"tv","tv","landscape");

});
</script>

</body>
</html>
