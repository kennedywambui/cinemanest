<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaNest - Discover & Stream</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --card-bg: #1e293b;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
        }
        .genre-nav {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .genre-pill {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid #475569;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        .genre-pill:hover, .genre-pill.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .movie-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .movie-card:hover {
            transform: scale(1.05);
        }
        .movie-poster {
            width: 100%;
            height: 270px;
            object-fit: cover;
            background-color: #334155;
        }
        .movie-info {
            padding: 12px;
        }
        .movie-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">CinemaNest</div>
    </header>

    <!-- Updated Genre Navigation Area -->
    <div class="genre-nav" id="genreNav">
        <button class="genre-pill active" onclick="filterGenre('all', this, 'All')">All</button>
        <button class="genre-pill" onclick="filterGenre('28', this, 'Action')">Action</button>
        <button class="genre-pill" onclick="filterGenre('35', this, 'Comedy')">Comedy</button>
        <button class="genre-pill" onclick="filterGenre('27', this, 'Horror')">Horror</button>
        <button class="genre-pill" onclick="filterGenre('10749', this, 'Romance')">Romance</button>
        <button class="genre-pill" onclick="filterGenre('african', this, 'African')">African</button>
    </div>

    <main>
        <div class="movie-grid" id="movieGrid">
            <!-- Dynamic movie cards will inject here -->
        </div>
    </main>

    <script>
        // Placeholder application state configuration
        const state = {
            currentGenre: 'all',
            currentPage: 1
        };

        function filterGenre(genreId, element, genreName) {
            // Update UI active state hierarchy
            document.querySelectorAll('.genre-pill').forEach(pill => pill.classList.remove('active'));
            element.classList.add('active');
            
            state.currentGenre = genreId;
            state.currentPage = 1;
            
            console.log(`Filtering UI content view for category: ${genreName} (ID: ${genreId})`);
            
            // Trigger your TMDB / EmbedMaster data fetch execution logic here
            fetchMovies(genreId);
        }

        function fetchMovies(genreId) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = ''; // Reset UI view
            
            // Dummy presentation loop simulating runtime rendering engine
            for(let i = 1; i <= 8; i++) {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="movie-poster"></div>
                    <div class="movie-info">
                        <div class="movie-title">${genreId.toUpperCase()} Title Example ${i}</div>
                        <div class="movie-meta">
                            <span>2026</span>
                            <span style="color: #eab308;">★ 8.2</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        // Run primary collection initial setup on script boot
        fetchMovies('all');
    </script>
</body>
</html>
