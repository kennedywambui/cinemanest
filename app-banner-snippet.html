<!-- ===== Cinema Nest: Get the App banner (paste right before </body> in index.html) ===== -->
<div id="cn-app-banner" style="
  display:none;
  position:fixed;
  bottom:16px;
  left:16px;
  right:16px;
  max-width:420px;
  margin:0 auto;
  background:#141414;
  border:1px solid rgba(229,9,20,0.35);
  border-radius:12px;
  padding:12px 14px;
  display:none;
  align-items:center;
  gap:12px;
  z-index:9999;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
  font-family:'DM Sans', sans-serif;
">
  <div style="
    width:36px;height:36px;border-radius:9px;background:#e50914;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  ">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M5 20h14v-2H5v2zm7-18v12.17l4.59-4.58L18 11l-6 6-6-6 1.41-1.41L12 14.17V2h0z"/></svg>
  </div>
  <div style="flex:1;color:#fff;font-size:13px;line-height:1.35;">
    <strong style="display:block;font-size:14px;">Get the Cinema Nest App</strong>
    <span style="color:#b3b3b3;">Faster access, right from your Home Screen.</span>
  </div>
  <a href="/download.html" style="
    background:#e50914;color:#fff;text-decoration:none;font-size:13px;font-weight:700;
    padding:8px 14px;border-radius:7px;flex-shrink:0;
  ">Get App</a>
  <button onclick="cnDismissAppBanner()" style="
    background:none;border:none;color:#888;font-size:20px;line-height:1;cursor:pointer;
    padding:2px 4px;flex-shrink:0;
  ">&times;</button>
</div>

<script>
  function cnDismissAppBanner() {
    document.getElementById('cn-app-banner').style.display = 'none';
    try { localStorage.setItem('cn_home_banner_dismissed', '1'); } catch (e) {}
  }

  (function () {
    // Don't show if already dismissed
    var dismissed = false;
    try { dismissed = localStorage.getItem('cn_home_banner_dismissed') === '1'; } catch (e) {}
    if (dismissed) return;

    // Don't show if already running as an installed app (standalone mode)
    var isStandalone = window.navigator.standalone === true ||
      window.matchMedia('(display-mode: standalone)').matches;
    if (isStandalone) return;

    // Don't show if already on the download page itself
    if (window.location.pathname.indexOf('download.html') !== -1) return;

    // Small delay so it doesn't compete with initial page load/hero banner
    setTimeout(function () {
      document.getElementById('cn-app-banner').style.display = 'flex';
    }, 2500);
  })();
</script>
<!-- ===== End Cinema Nest app banner ===== -->
